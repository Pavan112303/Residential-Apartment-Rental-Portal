# Railway configuration for the Flask backend service.
# In Railway dashboard: set this service's Root Directory to "backend/"

[build]
builder = "nixpacks"

[deploy]
startCommand = "sh -c 'gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --preload'"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
